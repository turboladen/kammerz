name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs so repeated pushes to a branch don't pile up.
# Scoped to pull_request only: push-to-main runs are left to finish so an
# intermediate main commit never records a cancelled (non-success) check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: every job only reads the repo (build/test/e2e) — none push,
# comment, or publish, so the GITHUB_TOKEN needs no write scopes.
permissions:
  contents: read

# Single source of truth for the bun version both frontend-touching jobs install.
env:
  BUN_VERSION: "1.3.14"

# WHAT each job does lives in the justfile (the ci-* / fmt-check / e2e recipes);
# these jobs only handle Actions-specific concerns — checkout, toolchain/tool
# setup, caching, the BUN_VERSION pin, and artifact upload — then call the
# matching recipe. `just ci` chains the same recipes locally; keep them in sync
# by editing the justfile, not by re-describing the commands here.
jobs:
  # Format gate → `just fmt-check`: dprint (Markdown/JSON/TOML/YAML per
  # dprint.jsonc), Prettier (frontend Svelte/TS/CSS), rustfmt (Rust). Fix
  # locally with `just fmt`.
  format:
    name: format (dprint + prettier + rustfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just,dprint
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Prettier needs node_modules; the recipe assumes deps are present.
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: just fmt-check

  # Backend gate → `just ci-backend`: cargo build + clippy (-D warnings) + test
  # --workspace --locked. Compiles against the empty frontend/build embed (the
  # committed .gitkeep satisfies rust-embed's #[folder]) — the SPA is never
  # served in tests.
  #
  # The job's display NAME is deliberately left as `backend (cargo test)` even
  # though it now also runs clippy: GitHub branch protection matches required
  # checks by reported name, so renaming this would leave any
  # `backend (cargo test)` required check perpetually pending until an admin
  # edits the rule. The new clippy step is documented in the comment above and
  # in commands.md; the name stays stable so this PR is safe to merge in any
  # order relative to the `all-checks` branch-protection migration.
  backend:
    name: backend (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just ci-backend

  # Frontend gate → `just ci-frontend`: frozen install + svelte-check +
  # production build (adapter-static).
  frontend:
    name: frontend (check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just ci-frontend

  # End-to-end smoke → `just e2e`: the recipe builds the SPA (via its
  # ci-frontend dependency), embeds it in the release binary, starts the server
  # with a runtime-minted argon2 hash, and drives the Playwright suite against
  # :3002. On failure it dumps the server log to the job output; the trace.zip +
  # screenshots are uploaded below for local replay (playwright show-trace).
  e2e:
    name: e2e (playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just e2e

      # Client-side complement to the recipe's server-log dump: upload the
      # Playwright trace.zip + screenshots so a maintainer can replay the failed
      # run's DOM/network locally. Default outputDir is frontend/test-results/.
      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
