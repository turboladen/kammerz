name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded PR runs so repeated pushes to a branch don't pile up.
# Scoped to pull_request only: push-to-main runs are left to finish so an
# intermediate main commit never records a cancelled (non-success) check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: every job only reads the repo (build/test/e2e) — none push,
# comment, or publish, so the GITHUB_TOKEN needs no write scopes. The `changes`
# job widens this to `pull-requests: read` at the job level (dorny/paths-filter
# reads the PR file list via the API); nothing else needs more than this.
permissions:
  contents: read

# Single source of truth for the bun version both frontend-touching jobs install.
env:
  BUN_VERSION: "1.3.14"

# WHAT each job does lives in the justfile (the ci-* / fmt-check / e2e recipes);
# these jobs only handle Actions-specific concerns — checkout, toolchain/tool
# setup, caching, the BUN_VERSION pin, and artifact upload — then call the
# matching recipe. `just ci` chains the same recipes locally; keep them in sync
# by editing the justfile, not by re-describing the commands here.
jobs:
  # Path filter → gates the (slow) e2e job. The dorny step runs ONLY on
  # pull_request, where it reads the PR's changed-file list via the API and
  # sets `code = true` when the diff touches code/build inputs; a .beads/**- or
  # docs-only PR leaves it `false` so e2e is skipped (the skip-aware all-checks
  # aggregator below keeps such a PR mergeable). On push the dorny step is
  # skipped entirely — no git-diff against github.event.before, which avoids
  # dorny's force-push / first-push / shallow-checkout failure modes that would
  # otherwise fail this job and redden main — and e2e instead runs
  # unconditionally via its `always()` guard. The job itself still runs on every
  # event so e2e's `needs: changes` never resolves to a skipped dependency. Only
  # e2e is conditional; format, backend, and frontend stay unconditional —
  # they're fast and catch the most.
  changes:
    name: detect code changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout (unused on PR; harmless on push)
      pull-requests: read # dorny reads the PR's changed-file list via the API
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        # PR-only: on push the output is ignored (e2e's always() forces a run),
        # so skip the git-diff entirely rather than risk a push-diff failure.
        if: ${{ github.event_name == 'pull_request' }}
        with:
          # `code = true` when ANY changed file matches — i.e. real source,
          # build inputs, or the CI definition itself. Everything NOT listed
          # here (notably .beads/** export noise and **/*.md docs) is treated
          # as non-triggering for e2e.
          filters: |
            code:
              - 'src/**'
              - 'entity/**'
              - 'migration/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'frontend/src/**'
              - 'frontend/static/**'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/vite.config.ts'
              - 'frontend/svelte.config.js'
              - 'frontend/playwright.config.ts'
              - 'frontend/tests/**'
              - 'justfile'
              - '.github/workflows/ci.yml'

  # Format gate → `just fmt-check`: dprint (Markdown/JSON/TOML/YAML per
  # dprint.jsonc), Prettier (frontend Svelte/TS/CSS), rustfmt (Rust). Fix
  # locally with `just fmt`.
  format:
    name: format (dprint + prettier + rustfmt)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just,dprint
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Prettier needs node_modules; the recipe assumes deps are present.
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: just fmt-check

  # Backend gate → `just ci-backend`: cargo build + clippy (-D warnings) + test
  # --workspace --locked. Compiles against the empty frontend/build embed (the
  # committed .gitkeep satisfies rust-embed's #[folder]) — the SPA is never
  # served in tests.
  #
  # The job's display NAME is deliberately left as `backend (cargo test)` even
  # though it now also runs clippy: GitHub branch protection matches required
  # checks by reported name, so renaming this would leave any
  # `backend (cargo test)` required check perpetually pending until an admin
  # edits the rule. The new clippy step is documented in the comment above and
  # in commands.md; the name stays stable so this PR is safe to merge in any
  # order relative to the `all-checks` branch-protection migration.
  backend:
    name: backend (cargo test)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just ci-backend

  # Frontend gate → `just ci-frontend`: frozen install + svelte-check +
  # production build (adapter-static).
  frontend:
    name: frontend (check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just ci-frontend

  # End-to-end smoke → `just e2e`: the recipe builds the SPA (via its
  # ci-frontend dependency), embeds it in the release binary, starts the server
  # with a runtime-minted argon2 hash, and drives the Playwright suite against
  # :3002. On failure it dumps the server log to the job output; the trace.zip +
  # screenshots are uploaded below for local replay (playwright show-trace).
  #
  # Conditional via `always() && (...)`: the always() drops GitHub's implicit
  # needs-success gate so this boolean is the ONLY thing gating e2e. It always
  # runs on push-to-main (full post-merge gate — even if the `changes` job
  # errored), and on a PR runs only when the `changes` filter flagged code
  # paths. Without always(), a failed `changes` job would silently skip e2e on
  # push (the implicit success() on `needs` would gate it).
  e2e:
    name: e2e (playwright smoke)
    needs: changes
    if: ${{ always() && (github.event_name == 'push' || needs.changes.outputs.code == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # Restore the Chromium binary so `just e2e`'s `bunx playwright install`
      # is a no-op on a hit instead of re-downloading. Keyed on the resolved
      # @playwright/test version, which is pinned in frontend/bun.lock. NOTE:
      # only the browser binary under ~/.cache/ms-playwright is cached — the
      # `--with-deps` apt system libraries are NOT (re-installed every run).
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: just e2e

      # Client-side complement to the recipe's server-log dump: upload the
      # Playwright trace.zip + screenshots so a maintainer can replay the failed
      # run's DOM/network locally. Default outputDir is frontend/test-results/.
      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore

  # Single required status for branch protection. `if: always()` so it runs even
  # when e2e was deliberately skipped (docs/beads-only PR). It FAILS if any
  # dependency ended in `failure` or `cancelled`, and TREATS `skipped` AS
  # ACCEPTABLE — so a skipped e2e doesn't wedge the merge, but a real failure
  # (including a broken `changes` filter job) still blocks it. Make THIS the only
  # required check in branch protection; the per-job names then become free to
  # rename/condition without touching the protection rule.
  all-checks:
    name: all-checks
    needs: [changes, format, backend, frontend, e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify required jobs (skipped is OK)
        # RESULTS holds only trusted status enums (success/failure/skipped/
        # cancelled), but pass it via env rather than inlining the expression
        # into the shell to keep to the no-interpolation-in-run convention.
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Dependency results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job ended with result '$r'."
              exit 1
            fi
          done
          echo "All required jobs passed (or were acceptably skipped)."
