# Cross-compilation for the Linux server (DietPi, ARM64). The linker comes
# from `brew install messense/macos-cross-toolchains/aarch64-unknown-linux-gnu`
# (see README "Deployment"); cc-rs finds the matching target-prefixed gcc for
# the bundled C deps (libsqlite3-sys, ring) by convention.
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-unknown-linux-gnu-gcc"
